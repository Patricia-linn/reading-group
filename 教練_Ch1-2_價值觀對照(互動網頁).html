      "我們的 SELF-CHECK 問：「上一次我因為別人的回饋而改變做法，是什麼時候？」挑一條你收過但還沒行動的回饋，這個月把它變成一個具體的改變。"

      { t: "場景二：好教練晚上不睡覺", d: "" , q: "好教練晚上不睡覺，滿腦子想著如何讓你變得更強。他們致力於打造出讓你可以不斷提升自我的環境。教練就像偉大藝術家，讓每一筆都落在最正確的地方。——NFL 名人堂球員洛特"},

const overviewEl = document.getElementById("overview");
const cardsEl = document.getElementById("cards");

data.forEach((v, i) => {
  const chip = document.createElement("div");
  chip.className = "chip";
  chip.textContent = v.num + "、" + v.title;
  chip.onclick = () => toggle(i, true);
  overviewEl.appendChild(chip);

  const card = document.createElement("div");
  card.className = "card" + (v.foundation ? " foundation" : "");
  card.id = "card-" + i;

  let scenesHtml = v.scenes.map(s => {
    if (s.q) {
      return `<div class="scene"><div class="scene-title">${s.t}</div><blockquote>${s.q}</blockquote></div>`;
    }
    return `<div class="scene"><div class="scene-title">${s.t}</div><p>${s.d}</p></div>`;
  }).join("");

  let quoteHtml = v.quote ? `<blockquote>${v.quote}</blockquote>` : "";

  let actionsHtml = "<ul class='action-list'>" + v.actions.map(a => `<li>${a}</li>`).join("") + "</ul>";

  card.innerHTML = `
    <div class="card-head" onclick="toggle(${i})">
      <div class="seal">${v.num}</div>
      <div class="head-text">
        <div class="title-row">
          <h3>${v.title}</h3>
          ${v.foundation ? '<span class="badge">★ 地基項</span>' : ''}
        </div>
        <p class="hook">${v.hook}</p>
      </div>
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="pour"></div>
    <div class="card-body" id="body-${i}">
      <div class="card-body-inner">
        <div class="section-label">📖 書中的場景</div>
        ${quoteHtml}
        ${scenesHtml}
        <div class="section-label">🔗 對回我們的價值觀</div>
        <p class="body-text">${v.correspond}</p>
        <div class="section-label">✅ 在方圓怎麼用</div>
        ${actionsHtml}
      </div>
    </div>
  `;
  cardsEl.appendChild(card);
});

function toggle(i, forceOpen) {
  const card = document.getElementById("card-" + i);
  const body = document.getElementById("body-" + i);
  const isOpen = card.classList.contains("open");
  if (isOpen && forceOpen) {
    card.scrollIntoView({ behavior: "smooth", block: "start" });
    return;
  }
  if (isOpen) {
    card.classList.remove("open");
    body.style.maxHeight = null;
  } else {
    card.classList.add("open");
    body.style.maxHeight = body.scrollHeight + "px";
    setTimeout(() => card.scrollIntoView({ behavior: "smooth", block: "start" }), 200);
  }
}
</script>
